spring.application.name=smart-expense-tracker
server.port=8080

# ─── Database ────────────────────────────────────────────────────────────────
# Override these via environment variables in production:
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/expense_tracker?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ─── JWT ─────────────────────────────────────────────────────────────────────
# Override APP_JWT_SECRET in production with a strong 256-bit key
app.jwt.secret=${APP_JWT_SECRET:SmartExpenseTrackerSecretKey2024VeryLongSecretKeyForJWTSigning}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# ─── CORS ────────────────────────────────────────────────────────────────────
# Set APP_CORS_ORIGINS to your frontend URL in production (e.g. https://yourdomain.com)
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:3000}

# ─── Springdoc / Swagger ─────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.Ethara.jayanth=INFO
logging.level.org.springframework.security=WARN
