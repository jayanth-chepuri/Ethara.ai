spring.application.name=smart-expense-tracker

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ethara?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=SmartExpenseTrackerSecretKey2024VeryLongSecretKeyForJWTSigning
app.jwt.expiration=86400000

# Server
server.port=8080

# Springdoc / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# CORS
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.Ethara.jayanth=DEBUG
logging.level.org.springframework.security=INFO
