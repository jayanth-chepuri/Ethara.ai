spring.application.name=smart-expense-tracker
# Render injects PORT env var; fall back to 8080 locally
server.port=${PORT:8080}

# ─── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/expense_tracker?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool — prevents startup crash when DB is slow to connect
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Removed hibernate.dialect — Hibernate 6 (Spring Boot 3.x) auto-detects it
spring.jpa.properties.hibernate.format_sql=false
# Defer datasource init so Hibernate waits for the pool to be ready
spring.jpa.defer-datasource-initialization=true

# ─── JWT ─────────────────────────────────────────────────────────────────────
app.jwt.secret=${APP_JWT_SECRET:SmartExpenseTrackerSecretKey2024VeryLongSecretKeyForJWTSigning}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# ─── CORS ────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:3000}

# ─── Springdoc / Swagger ─────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.Ethara.jayanth=INFO
logging.level.org.springframework.security=WARN
# Show DB connection errors clearly
logging.level.com.zaxxer.hikari=WARN
logging.level.org.hibernate=WARN
